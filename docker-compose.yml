version: '3'
services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
  homeassistant:
    image: lscr.io/linuxserver/homeassistant:latest
    ports:
      - "8123:8123"
    volumes:
      - ./ha_config:/config
    environment:
      - TZ=Asia/Kolkata
    restart: unless-stopped